<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>For Loop Example</title>
</head>
<body>
    <div id="output"></div>
    <script>
        const output = document.getElementById('output');
        let html = '<ul>';
        for (let i = 1; i <= 5; i++) {
            html += `<li>Loop iteration ${i}</li>`;
        }
        html += '</ul>';
        output.innerHTML = html;
    </script>
</body>
</html>
